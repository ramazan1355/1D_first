<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D | Data Protection</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-light: #f5f7fa;
            --accent-blue: #007AFF;
            --text-dark: #1a1a1a;
            --text-grey: #666;
            --card-bg: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Анимированный светлый градиент */
        .gradient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, #e0eafc, #f5f7fa, #cfdef3, #ffffff);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .phone-mockup {
            width: 375px;
            height: 812px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 44px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            padding: 40px 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { font-size: 22px; font-weight: 300; letter-spacing: 2px; color: var(--text-dark); }

        /* Скроллящаяся область */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 100px;
            scrollbar-width: none;
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        .hero {
            margin-top: 20px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .hero h1 { font-size: 46px; font-weight: 300; color: var(--text-dark); line-height: 1.1; }
        .hero p { font-size: 14px; color: var(--text-grey); margin: 15px 0 35px; line-height: 1.4; }

        .btn-main {
            background: #111;
            color: white;
            padding: 22px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            width: 100%;
            font-weight: 600;
        }

        .btn-main.active {
            background: var(--accent-blue);
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.8s ease forwards 0.2s;
            opacity: 0;
        }

        .stat-card h3 { font-size: 28px; margin-top: 10px; }
        .stat-card p { font-size: 10px; color: var(--text-grey); text-transform: uppercase; letter-spacing: 1px; }

        .list-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.8s ease forwards 0.4s;
            opacity: 0;
        }

        .tab-bar {
            position: absolute;
            bottom: 0; width: 100%;
            height: 85px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-item { color: #ccc; cursor: pointer; }
        .tab-item.active { color: var(--accent-blue); }

    </style>
</head>
<body>

    <div class="gradient-bg"></div>

    <div class="phone-mockup">
        <header>
            <div class="logo">1 D</div>
            <i data-lucide="menu" size="24"></i>
        </header>

        <div class="scroll-content">
            <div class="hero">
                <h1>Защита<br>Данных</h1>
                <p>Активное противодействие сбору ваших данных в реальном времени.</p>
            </div>

            <button class="btn-main" id="mainBtn" onclick="toggle()">
                <i data-lucide="shield" id="btnIcon"></i>
                <span id="btnText">АКТИВИРОВАТЬ ЩИТ</span>
            </button>

            <div class="stats">
                <div class="stat-card">
                    <i data-lucide="eye-off" size="20" color="#007AFF"></i>
                    <h3 id="count">0</h3>
                    <p>Фантомов</p>
                </div>
                <div class="stat-card">
                    <i data-lucide="check-circle" size="20" color="#007AFF"></i>
                    <h3>100%</h3>
                    <p>Безопасно</p>
                </div>
            </div>

            <div class="list-item">
                <div style="background:#fff; padding:10px; border-radius:12px;"><i data-lucide="map-pin" size="18"></i></div>
                <div>
                    <h4 style="font-size:14px;">Crowd-Shield Node #12</h4>
                    <p style="font-size:12px; color:#666;">Алматы, KZ</p>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active"><i data-lucide="home"></i></div>
            <div class="tab-item"><i data-lucide="zap"></i></div>
            <div class="tab-item"><i data-lucide="user"></i></div>
            <div class="tab-item"><i data-lucide="settings"></i></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let active = false;
        let interval;

        async function toggle() {
            const btn = document.getElementById('mainBtn');
            const txt = document.getElementById('btnText');
            const count = document.getElementById('count');
            
            const nextState = !active;

            try {
                // Запрос к бэкенду
                const response = await fetch('http://localhost:3000/api/toggle-shield', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: nextState })
                });
                const data = await response.json();

                if (data.success) {
                    active = nextState;
                    if(active) {
                        btn.classList.add('active');
                        txt.innerText = "ЩИТ АКТИВИРОВАН";
                        let n = 0;
                        interval = setInterval(() => {
                            n += Math.floor(Math.random() * 5);
                            count.innerText = n + "+";
                        }, 200);
                    } else {
                        btn.classList.remove('active');
                        txt.innerText = "АКТИВИРОВАТЬ ЩИТ";
                        clearInterval(interval);
                        count.innerText = "0";
                    }
                }
            } catch (e) {
                alert("Запустите backend сервер (node server.js)");
            }
        }
    </script>
</body>
</html>
